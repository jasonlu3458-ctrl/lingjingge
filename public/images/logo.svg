  <path d="M420 220 L455 200" fill="none" stroke="#2C2C2C" stroke-width="1.5"/>
  
  <!-- 屋顶第二层 -->
  <path d="M220 260 L300 220 L380 260" fill="none" stroke="#2C2C2C" stroke-width="2"/>
  <path d="M225 265 L300 225 L375 265" fill="#3C3C3C" opacity="0.7"/>
  
  <!-- 柱子 -->
  <line x1="230" y1="260" x2="230" y2="380" stroke="#2C2C2C" stroke-width="5" opacity="0.75"/>
  <line x1="370" y1="260" x2="370" y2="380" stroke="#2C2C2C" stroke-width="5" opacity="0.75"/>
  <line x1="270" y1="260" x2="270" y2="365" stroke="#2C2C2C" stroke-width="3" opacity="0.6"/>
  <line x1="330" y1="260" x2="330" y2="365" stroke="#2C2C2C" stroke-width="3" opacity="0.6"/>
  
  <!-- 横梁 -->
  <line x1="230" y1="260" x2="370" y2="260" stroke="#2C2C2C" stroke-width="3"/>
  <line x1="240" y1="280" x2="360" y2="280" stroke="#2C2C2C" stroke-width="2" opacity="0.6"/>
  <line x1="250" y1="295" x2="350" y2="295" stroke="#2C2C2C" stroke-width="1.5" opacity="0.5"/>
  
  <!-- 书法"灵"字 -->
  <text x="300" y="160" font-family="Ma Shan Zheng, STKaiti, Kaiti, serif" font-size="80" fill="#2C2C2C" text-anchor="middle" style="font-weight:bold;">灵</text>
  
  <!-- 金色点缀 -->
  <circle cx="250" cy="340" r="3" fill="#D4A574" opacity="0.7"/>
  <circle cx="300" cy="320" r="3.5" fill="#D4A574" opacity="0.8"/>
  <circle cx="350" cy="345" r="3" fill="#D4A574" opacity="0.6"/>
  <circle cx="220" cy="360" r="2" fill="#D4A574" opacity="0.5"/>
  <circle cx="280" cy="355" r="2" fill="#D4A574" opacity="0.6"/>
  <circle cx="320" cy="350" r="2.5" fill="#D4A574" opacity="0.7"/>
  <circle cx="380" cy="365" r="2" fill="#D4A574" opacity="0.5"/>
  <circle cx="300" cy="380" r="2.5" fill="#D4A574" opacity="0.7"/>
  <circle cx="310" cy="395" r="2" fill="#D4A574" opacity="0.6"/>
  <circle cx="290" cy="410" r="1.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="300" cy="425" r="2" fill="#D4A574" opacity="0.6"/>
  <circle cx="305" cy="440" r="1.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="295" cy="455" r="1.5" fill="#D4A574" opacity="0.4"/>
  
  <!-- 底座 -->
  <path d="M220 480 Q300 495 Q380 480" fill="#2C2C2C" opacity="0.85"/>
  <path d="M230 490 Q300 505 Q370 490" fill="#1A1A1A" opacity="0.6"/>
  
