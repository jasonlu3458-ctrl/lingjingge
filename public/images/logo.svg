<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- 背景 -->
  <rect width="600" height="600" fill="#F5F0EB"/>
  
  <!-- 墨圈 - 水墨笔触效果 -->
  <path d="M300 80 Q450 150 480 300 Q510 450 360 520 Q210 590 150 440 Q90 290 240 220 Q390 150 300 80" 
        fill="none" stroke="#2C2C2C" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
  <path d="M300 95 Q440 160 470 300 Q500 440 350 510 Q200 580 160 430 Q120 280 250 225 Q380 170 300 95" 
        fill="none" stroke="#3C3C3C" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  
  <!-- 远山 -->
  <path d="M150 380 Q200 340 250 370 Q300 400 350 360 Q400 320 450 370" 
