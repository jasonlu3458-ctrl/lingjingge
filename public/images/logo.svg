  <path d="M190 225 L300 150 L410 225" fill="#2C2C2C" opacity="0.85"/>
  
  <!-- 屋檐角 -->
  <path d="M180 220 L150 190 Q140 180 135 185" fill="none" stroke="#2C2C2C" stroke-width="2"/>
